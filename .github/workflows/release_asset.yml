name: Release Asset

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Zip
        run: |
          zip -r babelfish.zip . -x "*.git*" "tests/*" ".venv/*" "__pycache__/*" "models/*" "tmp_extraction/*" "*.log" "uv.lock" "test_output.txt"
          
      - name: Create and Upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use fallback logic: if release event, use tag_name; otherwise use input version
          TAG_NAME: ${{ github.event.release.tag_name || inputs.version }}
          IS_RELEASE_EVENT: ${{ github.event_name == 'release' }}
        run: |
          echo "Target Tag: $TAG_NAME"
          
          if [ -z "$TAG_NAME" ]; then
            echo "Error: Tag name is empty!"
            exit 1
          fi

          if [ "$IS_RELEASE_EVENT" != "true" ]; then
             echo "Ensuring release $TAG_NAME exists..."
             gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes || echo "Release creation failed (might already exist)"
          fi
          
          echo "Uploading asset to $TAG_NAME..."
          gh release upload "$TAG_NAME" babelfish.zip --clobber
