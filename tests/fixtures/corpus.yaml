  ghost_count: 0
- id: joke
  filename: joke.wav
  duration_s: 18.5686875
  language: en
  transcript: 'A woman gets on a bus with her baby. The bus driver says:

    "Ugh, that''s the ugliest baby I''ve ever seen!"

    The woman walks to the rear of the bus and sits down, fuming.

    She says to a man next to her:

    "The driver just insulted me!"

    The man says: "You go up there and tell him off.

    Go on, I''ll hold your monkey for you."

    '
  expected_ghosts: []
  notes: Long-form test with multiple sentences and dialogue
  actual_transcript: A woman gets on a bus with her baby. The bus driver says You
    that's the ugliest baby I've ever seen. The woman walks to the wheel of the bus
    and sits down, fuming. She says to a man next to her, The driver just insulted
    me. The man says, You go up there and tell him off. Go on, I hold your monkey
    for you.
  ghost_count: 0
